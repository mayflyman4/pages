<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you marry me?</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 50%, #ff9a9e 100%);
            overflow: hidden;
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(36px, 10vw, 72px);
            color: white;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.25);
            margin-bottom: 30px;
            text-align: center;
            font-style: italic;
        }

        .ring {
            font-size: clamp(60px, 15vw, 110px);
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .button-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 500px;
        }

        button {
            padding: 15px 30px;
            font-size: clamp(18px, 4vw, 24px);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            touch-action: manipulation;
            min-width: 140px;
            font-family: inherit;
        }

        #yesBtn {
            background-color: #e91e63;
            color: white;
            transform: scale(1);
            z-index: 10;
            position: relative;
            box-shadow: 0 4px 12px rgba(233,30,99,0.4);
        }

        #yesBtn:hover {
            box-shadow: 0 8px 20px rgba(233,30,99,0.6);
        }

        #noBtn {
            background-color: #9e9e9e;
            color: white;
        }

        .result-container {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .result-emoji {
            font-size: clamp(80px, 25vw, 200px);
            animation: pulse 1.2s ease-in-out infinite;
        }

        .result-text {
            font-size: clamp(32px, 8vw, 56px);
            color: white;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.25);
            margin-top: 20px;
            font-style: italic;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .sparkle {
            position: fixed;
            font-size: 28px;
            pointer-events: none;
            animation: sparkle-float 3s ease-in-out infinite;
            opacity: 0;
        }

        .sparkle::before {
            content: '💖';
        }

        @keyframes sparkle-float {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0) rotate(0deg);
            }
            10% {
                opacity: 1;
                transform: translateY(-20px) scale(1) rotate(10deg);
            }
            50% {
                opacity: 0.9;
                transform: translateY(-50vh) scale(1.2) rotate(-10deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) scale(0.8) rotate(20deg);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                margin-bottom: 20px;
            }

            .button-container {
                gap: 15px;
                flex-direction: column;
            }

            button {
                width: 80%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="ring">💍</div>
    <h1>Will you marry me?</h1>

    <div class="button-container" id="buttonContainer">
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No</button>
    </div>

    <div class="result-container" id="resultContainer">
        <div class="result-emoji">💍❤️</div>
        <div class="result-text">Forever, you &amp; me</div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const buttonContainer = document.getElementById('buttonContainer');
        const resultContainer = document.getElementById('resultContainer');

        let currentScale = 1;

        noBtn.addEventListener('mouseenter', () => {
            growYesButton();
            moveButton();
        });

        noBtn.addEventListener('mousemove', () => {
            moveButton();
        });

        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            growYesButton();
            moveButton();
        }, { passive: false });

        function growYesButton() {
            currentScale += 0.1;
            yesBtn.style.transform = `scale(${currentScale})`;
        }

        function moveButton() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;

            const x = Math.random() * Math.max(0, maxX);
            const y = Math.random() * Math.max(0, maxY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.max(10, x) + 'px';
            noBtn.style.top = Math.max(10, y) + 'px';
        }

        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';

            sparkle.style.left = Math.random() * window.innerWidth + 'px';
            sparkle.style.top = window.innerHeight + 'px';

            sparkle.style.animationDelay = Math.random() * 2 + 's';
            sparkle.style.animationDuration = (Math.random() * 2 + 3) + 's';

            document.body.appendChild(sparkle);

            setTimeout(() => {
                sparkle.remove();
            }, 6000);
        }

        yesBtn.addEventListener('click', () => {
            buttonContainer.style.display = 'none';
            document.querySelector('.ring').style.display = 'none';
            document.querySelector('h1').style.display = 'none';
            resultContainer.style.display = 'flex';

            setInterval(createSparkle, 200);

            for (let i = 0; i < 30; i++) {
                setTimeout(createSparkle, i * 80);
            }
        });
    </script>
</body>
</html>
